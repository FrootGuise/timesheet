<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Timesheet</title>
        <meta name="description" content="Timesheet Creator">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=
Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=
Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="bodyshell">
<div id="savedoptions" class="savedoptionsc1">
            <div class="optionbox1" id="starttime">
                <label class="label1">Arrive</label>
                <input type="time" class="timeentrybox" id="starttimeentry" value="08:00"/>
            </div>
            <div class="optionbox1" id="starttravelbase">
                <label class="label1">S-Base</label>
                <input type="time" class="timeentrybox" id="startbasetimeentry" value="00:10"/>
            </div>

            <div class="optionbox1" id="endtime">
                <label class="label1">Leave</label>
                <input type="time" class="timeentrybox" id="endtimeentry" value="15:30"/>
            </div>
            <div class="optionbox1" id="endtravelbase">
                <label class="label1">E-Base</label>
                <input type="time" class="timeentrybox" id="endbasetimeentry" value="00:20"/>
            </div>
            
</div>
<div class="confirmsaved1" id="saveBtnShell">
                <button class="btn1" id="confirmsavebtn">Save</button>
            </div>

<div id="displaygrid">
    <div class="displayrow">
    <label class="label3">Leave Home:</label>
    <label class="label3" id="arrivalresult1">07:54</label>
</div>
<div class="displayrow">
    <label class="label3">Arrive Home:</label>
    <label class="label3" id="arrivalresult2">15:52</label>
</div>

</div>

<div class="confirmsaved1" id="genBtnShell">
                <button class="btn1" id="generatebtn">Generate</button>
            </div>


        </div>
        
        <script src="./script.js" async defer></script>
    </body>
</html>
